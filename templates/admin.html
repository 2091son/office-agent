<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <nav>
        <a href="/chat">AI Office</a>
        <a href="/admin" style="color:#ea4335;">Admin</a>
        <span style="margin-left:auto;color:#888;">Admin</span>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
    <main>
        <div class="result-container">
            <h1>Admin Panel</h1>

            <button class="btn-primary" style="margin-bottom:16px;" onclick="addContact()">+ Add Contact</button>
            <h3>Contacts</h3>
            <div id="contactsList" style="margin-bottom:24px;"></div>

            <h2>Tool Usage Stats</h2>
            <table style="width:100%;border-collapse:collapse;margin-bottom:24px;" id="statsTable"></table>

            <h2>Recent Logs</h2>
            <table style="width:100%;border-collapse:collapse;" id="logsTable"></table>
        </div>
    </main>
    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/'; }

        function addContact() {
            const name = prompt('Name'); if (!name) return;
            const email = prompt('Email'); if (!email || !email.includes('@')) { alert('Invalid email'); return; } const dept = prompt('Department') || '';
            fetch('/api/contacts', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ name, email, department: dept }) }).then(() => location.reload());
        }

        function loadContacts() {
            fetch('/api/contacts', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json()).then(data => {
                document.getElementById('contactsList').innerHTML = data.map(c => '<div style="padding:4px 0;">' + c.name + ' - ' + c.email + ' (' + c.department + ')</div>').join('');
            });
        }

        fetch('/api/admin', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => { if (!r.ok) { document.body.innerHTML = 'No permission'; return; } return r.json(); })
            .then(data => {
                let statsHtml = '<tr><th style="text-align:left;padding:8px;">Tool</th><th style="text-align:center;padding:8px;">Count</th></tr>';
                if (data.stats) data.stats.forEach(s => {
                    statsHtml += '<tr><td style="padding:8px;">' + s[0] + '</td><td style="text-align:center;padding:8px;">' + s[1] + '</td></tr>';
                });
                document.getElementById('statsTable').innerHTML = statsHtml;

                let logsHtml = '<tr><th>Time</th><th>User</th><th>Action</th><th>Detail</th></tr>';
                if (data.logs) data.logs.forEach(log => {
                    logsHtml += '<tr><td>' + log.time + '</td><td>' + log.user + '</td><td>' + log.action + '</td><td>' + (log.detail || '') + '</td></tr>';
                });
                document.getElementById('logsTable').innerHTML = logsHtml;
            });
        loadContacts();

        function logout() { localStorage.removeItem('token'); window.location.href = '/'; }
        function makeAdmin() {
            const uid = prompt('输入要升级的用户ID');
            if (!uid) return;
            fetch('/api/admin/promote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ user_id: parseInt(uid) })
            }).then(r => r.json()).then(d => alert(d.message || 'Done'));
        }
    </script>
</body>

</html>
