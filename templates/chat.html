<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 办公助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        .sidebar {
            width: 240px;
            background: #fafafa;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 12px;
        }

        .sidebar h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .sidebar-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .sidebar-item:hover {
            background: #e8f0fe;
        }

        .sidebar-item.active {
            background: #e8f0fe;
            color: #1a73e8;
        }

        .new-chat-btn {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/chat">AI 办公助手</a>
        <span style="margin-left:auto;color:#888;" id="userInfo"></span>
        <a href="#" onclick="logout()">退出</a>
    </nav>
    <div class="layout">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
            <h3>对话历史</h3>
            <div id="convList"></div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <button onclick="exportConv()"
                    style="float:right;background:none;border:1px solid #ccc;padding:4px 12px;border-radius:4px;cursor:pointer;">Export</button>
                <h2>AI 办公助手</h2>
                <p>生成周报 · 整理会议纪要 · 处理表格 · 发送通知 · 搜索知识库</p>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="试试：帮我写一份本周的周报..." autofocus>
                <button id="sendBtn" class="btn-primary">发送</button>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        const role = localStorage.getItem('role');
        if (role === 'admin') {
            document.querySelector('nav').innerHTML += '<a href="/admin" style="color:#ea4335;">管理面板</a>';
        }
        let currentConvId = null;
        const ws = new WebSocket(`ws://${location.host}/ws/chat?token=${token}`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'reply') {
                addMessage('assistant', data.content);
            } else if (data.type === 'error') {
                addMessage('error', data.content);
            }
        };

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-content">${content.replace(/\n/g, '<br>')}</div>`;
            document.getElementById('chatMessages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            if (!currentConvId) {
                fetch('/api/conversations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: msg.substring(0, 30), user_id: 1 })
                }).then(r => r.json()).then(d => {
                    currentConvId = d.id;
                    ws.send(JSON.stringify({ message: msg, conv_id: currentConvId }));
                    addMessage('user', msg);
                    loadConversations();
                });
            } else {
                ws.send(JSON.stringify({ message: msg, conv_id: currentConvId }));
                addMessage('user', msg);
            }
            input.value = '';
        }

        function newChat() {
            currentConvId = null;
            document.getElementById('chatMessages').innerHTML = '';
        }

        function loadConversation(convId) {
            currentConvId = convId;
            document.getElementById('chatMessages').innerHTML = '';
            fetch('/api/conversations/' + convId)
                .then(r => r.json())
                .then(msgs => {
                    msgs.forEach(m => addMessage(m.role, m.content));
                });
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function loadConversations() {
            fetch('/api/conversations', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(convs => {
                    document.getElementById('convList').innerHTML = convs.map(c =>
                        `<div class="sidebar-item" onclick="loadConversation(${c.id})">${c.title}</div>`
                    ).join('');
                });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        loadConversations();
        function exportConv() {
            if (!currentConvId) { alert('No conversation selected'); return; }
            fetch('/api/conversations/' + currentConvId + '/export')
                .then(r => r.json()).then(d => {
                    const blob = new Blob([d.text], { type: 'text/plain' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'conversation.txt';
                    a.click();
                });
        }
    </script>
</body>

</html>
