<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 办公助手 - 注册</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <h2>注册</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="用户名" required>
            <input type="password" id="password" placeholder="密码" required>
            <input type="password" id="password2" placeholder="确认密码" required>
            <button type="submit" class="btn-primary">注册</button>
        </form>
        <p style="text-align:center;margin-top:16px;">
            已有账号？<a href="/">返回登录</a>
        </p>
        <p id="error" style="color:red;text-align:center;"></p>
    </div>
    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        if (pw !== document.getElementById('password2').value) {
            document.getElementById('error').textContent = '两次密码不一致';
            return;
        }
        const resp = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: pw
            })
        });
        const data = await resp.json();
        if (resp.ok) {
            alert('注册成功，请登录');
            window.location.href = '/';
        } else {
            document.getElementById('error').textContent = data.detail;
        }
    });
    </script>
</body>
</html>
